name: toy_energy_buffer_source_loss_recovery
model: ToyEnergyBufferMode
steps:
  - atMs: 0
    setInput:
      name: externalPowerAvailable
      value: false
  - atMs: 10
    setInput:
      name: emptyDetected
      value: true
  - atMs: 20
    setInput:
      name: externalPowerAvailable
      value: true
expect:
  finalState: CHARGE
  outputs:
    supplyEnabled: false
    chargeIndicator: true
