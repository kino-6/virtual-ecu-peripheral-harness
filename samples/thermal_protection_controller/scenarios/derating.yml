name: thermal_protection_derating
model: ToyThermalProtectionController
steps:
  - atMs: 0
    setInput:
      name: temperatureValid
      value: true
  - atMs: 50
    setInput:
      name: temperatureC
      value: 96
expect:
  finalState: DERATING
  outputs:
    fanDuty: 95
    deratingCommand: 45
    diagnosticFault: false
    safeCommandActive: false

